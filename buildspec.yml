version: 0.2

phases:
  install:
    commands:
      - echo Installing dependencies...
      - pip install -r requirements.txt || echo "No requirements file"

  build:
    commands:
      - echo Running unit tests...
      - python -m unittest   # ✅ THIS is important

  post_build:
    commands:
      - echo Build completed

artifacts:
  files:
    - '**/*'
